<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" font-family="'Hiragino Sans', 'Meiryo', sans-serif">

  <!-- 背景 -->
  <rect width="820" height="520" fill="#f8f9fa" rx="12"/>

  <!-- タイトル -->
  <text x="410" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Git リモートリポジトリの構成</text>

  <!-- ===== 自分のPC ===== -->
  <rect x="30" y="60" width="220" height="380" rx="10" fill="#fff" stroke="#4a90d9" stroke-width="2"/>
  <rect x="30" y="60" width="220" height="40" rx="10" fill="#4a90d9"/>
  <rect x="30" y="90" width="220" height="10" fill="#4a90d9"/>
  <text x="140" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">💻 自分のPC（ローカル）</text>

  <!-- main ブランチ -->
  <rect x="50" y="120" width="180" height="130" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="140" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a90d9">main ブランチ</text>
  <line x1="60" y1="150" x2="220" y2="150" stroke="#4a90d9" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="70" y="170" font-size="12" fill="#555">📁 sankou/</text>
  <text x="70" y="190" font-size="12" fill="#555">📄 CLAUDE.md</text>
  <text x="70" y="210" font-size="12" fill="#555">📄 HTML / CSS / JS</text>
  <text x="70" y="232" font-size="11" fill="#888">（全ファイル含む）</text>

  <!-- submit ブランチ -->
  <rect x="50" y="270" width="180" height="130" rx="8" fill="#fef9e7" stroke="#e6a817" stroke-width="1.5"/>
  <text x="140" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#c68a00">submit ブランチ</text>
  <line x1="60" y1="300" x2="220" y2="300" stroke="#e6a817" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="70" y="320" font-size="12" fill="#555">📄 HTML / CSS / JS</text>
  <text x="70" y="342" font-size="12" fill="#888">（成果物のみ）</text>
  <text x="70" y="365" font-size="11" fill="#888">sankou/ は含まない</text>

  <!-- ===== GitHub ===== -->
  <rect x="530" y="80" width="260" height="160" rx="10" fill="#fff" stroke="#2ea44f" stroke-width="2"/>
  <rect x="530" y="80" width="260" height="40" rx="10" fill="#2ea44f"/>
  <rect x="530" y="110" width="260" height="10" fill="#2ea44f"/>
  <text x="660" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">🐙 GitHub（自分専用）</text>
  <text x="660" y="148" text-anchor="middle" font-size="13" fill="#333">家 ↔ 会社の同期用</text>
  <text x="660" y="170" text-anchor="middle" font-size="12" fill="#555">全ファイルがある</text>
  <text x="660" y="192" text-anchor="middle" font-size="12" fill="#888">（sankou/ も含む）</text>
  <text x="660" y="216" text-anchor="middle" font-size="12" fill="#888">RESTARTさんは見ない</text>

  <!-- ===== Backlog ===== -->
  <rect x="530" y="290" width="260" height="160" rx="10" fill="#fff" stroke="#e05a5a" stroke-width="2"/>
  <rect x="530" y="290" width="260" height="40" rx="10" fill="#e05a5a"/>
  <rect x="530" y="320" width="260" height="10" fill="#e05a5a"/>
  <text x="660" y="316" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">📋 Backlog（共有用）</text>
  <text x="660" y="358" text-anchor="middle" font-size="13" fill="#333">RESTARTさんと共有</text>
  <text x="660" y="380" text-anchor="middle" font-size="12" fill="#555">成果物のみ届く</text>
  <text x="660" y="402" text-anchor="middle" font-size="12" fill="#888">（sankou/ は見えない）</text>
  <text x="660" y="424" text-anchor="middle" font-size="12" fill="#888">チームも使う</text>

  <!-- ===== 矢印：main → GitHub ===== -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e6a817"/>
    </marker>
  </defs>

  <line x1="232" y1="175" x2="526" y2="155" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow-blue)" stroke-dasharray="0"/>

  <!-- コマンドラベル（main→GitHub） -->
  <rect x="295" y="148" width="220" height="24" rx="5" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1"/>
  <text x="405" y="164" text-anchor="middle" font-size="12" fill="#2266aa" font-weight="bold">git push origin main</text>

  <!-- ===== 矢印：submit → Backlog ===== -->
  <line x1="232" y1="360" x2="526" y2="370" stroke="#e6a817" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- コマンドラベル（submit→Backlog） -->
  <rect x="272" y="338" width="242" height="24" rx="5" fill="#fef9e7" stroke="#e6a817" stroke-width="1"/>
  <text x="393" y="354" text-anchor="middle" font-size="12" fill="#9a6500" font-weight="bold">git push restart submit</text>

  <!-- ===== ニックネーム注釈 ===== -->
  <rect x="30" y="460" width="760" height="48" rx="8" fill="#fff8e1" stroke="#f0c040" stroke-width="1.5"/>
  <text x="410" y="480" text-anchor="middle" font-size="13" fill="#7a5c00">
    💡 <tspan font-weight="bold">origin</tspan> と <tspan font-weight="bold">restart</tspan> は「自分のPC上だけ」のニックネーム（ラベル）です
  </text>
  <text x="410" y="500" text-anchor="middle" font-size="12" fill="#9a7a00">相手（GitHub・Backlog）には届いたファイルの中身しか見えません</text>

</svg>
